<!DOCTYPE html>
<html>
	<head>
		<title>Post Promise 2</title>
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
		<link rel ="stylesheet" href ="./assets/css/style.css">
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
	</head>
	<body>
		<div class="container-fluid mt-5">
			<div class="row">
				<div class="col-md-6 offset-md-3">
					<div class="card">
						<div class="card-header">
							<h2>ADD POST</h2>
						</div>
						<div class="card-body">
							<form action="" id="inputform">
								<div class="form-group">
									<label for="title" class="font-weight-bold">Title*</label>
									<input type="text" required class="form-control" id="title">
								</div>
								<div class="form-group">
									<label for="body" class="font-weight-bold">Body*</label>
									<textarea rows="4" required class="form-control" id="body"></textarea>
								</div>
								<div class="form-group">
									<label for="userId" class="font-weight-bold">UserId*</label>
									<select class="form-control" id="userId">
										<option value="1">1</option>
										<option value="2">2</option>
										<option value="3">3</option>
										<option value="4">4</option>
										<option value="5">5</option>
										<option value="6">6</option>
										<option value="7">7</option>
										<option value="8">8</option>
										<option value="9">9</option>
										<option value="10">10</option>
									</select>
								</div>
								<button class="btn btn-primary btn-sm btn-block" id="addpost">Add Post</button>
								<button type="button" class="btn btn-success btn-sm btn-block d-none" id="updatepost">Update Post</button>

							</form>
						</div>
					</div>
				</div>
			</div>
			<div class="row mt-5" id="cardcontainer">
			
			</div>
			<div class="spinner d-none" id="spinner">
				<div class="spinner-border text-primary" role="status">
  					<span class="sr-only">Loading...</span>
				</div>
			</div>
					
			
		</div>
		
		<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
		<script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
		<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
		<script src="./assets/js/app.js"></script>
	</body>
</html>
